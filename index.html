<!DOCTYPE html>
<html>
<head>
  <title>Brandly Official</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }

    .hero {
      padding: 120px 20px;
      background: linear-gradient(135deg, #111, #222);
    }

    h1 {
      font-size: 50px;
    }

    .section {
      padding: 60px 20px;
    }

    .card {
      background: #1c1c1c;
      padding: 20px;
      margin: 10px;
      display: inline-block;
      width: 250px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <div class="hero">
    <h1>Brandly Official</h1>
    <p>We design brands that actually look like they deserve attention.</p>
  </div>

  <div class="section">
    <h2>Services</h2>

    <div class="card">Graphic Design</div>
    <div class="card">Social Media Management</div>
    <div class="card">Brand Strategy</div>
  </div>

</body>
</html>
